<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Mathe-Starter 2026 - Final Fix</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <link rel="stylesheet" href="css/tool_gt.css">
</head>
<body>

<div id="app">
    	
    <div v-if="!viewMode && !worksheetMode && !trainingMode" class="config-container">
		<h1 style="font-weight: 900; color: var(--slate-800);">Mathe-Starter Konfigurator</h1>
		
		<div class="settings-bar">
			<label class="checkbox-label" style="font-weight: bold;">
				Aufgabenanzahl:
				<input type="number" v-model.number="taskCount" min="1" max="200" class="settings-input">
			</label>
			<label class="checkbox-label" style="font-weight: bold; margin-left: 30px;">
				<input type="checkbox" v-model="mentalMathMode">
				💡 Quiz / Kopfaufgaben
			</label>
		</div>

        <div style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 30px">
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
				<button @click="generateAll" class="start-btn" style="margin: 0; padding: 10px 20px;">
					Display 🎲
				</button>
				
				<button @click="generateWorksheet" class="start-btn" style="margin: 0; padding: 10px 20px; background: var(--primary); color: white;">
					Arbeitsblatt 📋
				</button>

                <button @click="startTraining" class="start-btn" style="margin: 0; padding: 10px 20px; background: var(--primary); color: white;">
                    Training 🏋️
                </button>
			</div>
			
			<button @click="invertSelection" class="btn-ui" style="background: var(--slate-300); color: var(--slate-800); font-size: 0.9rem;">
				Selection invertieren 🔄
			</button>
		</div>
		<div class="type-grid">
            <div v-for="(label, key) in typeLabels" :key="key" class="type-option">
                <label class="checkbox-label type-label">
                    <input type="checkbox" v-model="selectedTypes" :value="key">
                    <input type="number" v-model.number="taskWeights[key]" min="1" max="9" step="1" class="weight-input" title="Gewichtung">
                    <span>{{ label }}</span>
                </label>
            </div>
		</div>
	</div>

    <div v-else-if="worksheetMode" class="worksheet-view">
        <div class="worksheet-toolbar no-print">
            <button @click="leaveWorksheet" class="btn-ui btn-back">← Zurück</button>
            <label class="worksheet-meta-label">
                GT
                <input type="number" v-model.number="gtNumber" min="1" max="99" class="worksheet-meta-input">
            </label>
            <div class="worksheet-toolbar-actions">
                <button @click="toggleWorksheetSolutions" class="btn-ui btn-toggle">
                    {{ showWorksheetSolutions ? 'Aufgaben anzeigen' : 'Lösungen anzeigen' }}
                </button>
                <button @click="generateWorksheet" class="btn-ui btn-primary">Neue Aufgaben 🎲</button>
                <button @click="exportWorksheetJSON" class="btn-ui btn-export">JSON Export</button>
                <button @click="downloadWorksheetHTML" class="btn-ui btn-export">Datei speichern 💾</button>
                <button @click="printWorksheet" class="btn-ui btn-primary">Drucken</button>
            </div>
        </div>

        <div class="worksheet-sheet">
            <div class="worksheet-sheet-header">
                <div class="worksheet-header-copy">
                    <span>Name:</span>
                    <span class="worksheet-header-gt">GT {{ gtNumber }}</span>
                </div>
                <div class="worksheet-header-copy">
                    <span>Name:</span>
                    <span class="worksheet-header-gt">GT {{ gtNumber }}</span>
                </div>
            </div>

            <div class="worksheet-list">
                <div v-for="(task, index) in tasks" :key="'worksheet-'+index" class="worksheet-row">
                    <div class="worksheet-copy">
                        <div class="worksheet-num">{{ index + 1 }})</div>
                        <div class="worksheet-content">
                            <div v-if="!showWorksheetSolutions" class="worksheet-math" v-html="task.textPrint"></div>
                            <div v-else class="worksheet-solution" v-html="task.solution"></div>
                        </div>
                    </div>

                    <div class="worksheet-copy">
                        <div class="worksheet-num">{{ index + 1 }})</div>
                        <div class="worksheet-content">
                            <div v-if="!showWorksheetSolutions" class="worksheet-math" v-html="task.textPrint"></div>
                            <div v-else class="worksheet-solution" v-html="task.solution"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div v-else-if="trainingMode" class="training-view">
        <div class="training-top-bar">
            <button @click="leaveTraining" class="btn-ui btn-back">← Zurück zum Start</button>
            <div class="training-progress">Aufgabe {{ currentTrainingIndex + 1 }} / {{ tasks.length }}</div>
            <button @click="toggleTrainingSolution" class="btn-ui btn-toggle">
                {{ showTrainingSolution ? 'Aufgabe anzeigen' : 'Lösung anzeigen' }}
            </button>
        </div>

        <div class="training-main">
            <button @click="goToPreviousTrainingTask" class="training-arrow" aria-label="Vorherige Aufgabe">
                ←
            </button>

            <div class="training-task-card">
                <div v-if="!showTrainingSolution" class="training-task-content math-q" v-html="currentTrainingTask?.textDisplay ?? ''"></div>
                <div v-else class="training-task-content math-a" v-html="currentTrainingTask?.solution ?? ''"></div>
            </div>

            <button @click="goToNextTrainingTask" class="training-arrow" aria-label="Nächste Aufgabe">
                →
            </button>
        </div>
    </div>

    <div v-else :class="['presentation-view', { 'dark-mode': isDarkMode }]">
        <div class="top-bar">
            <button @click="viewMode = false" class="btn-ui btn-back">← Zurück</button>
            <div style="font-weight: 900; color: var(--slate-300);">KLASSE 2026</div>
            
            <div class="top-bar-actions">
                <button @click="toggleDarkMode" class="btn-ui btn-theme">
                    {{ isDarkMode ? 'Hellmodus' : 'Dunkelmodus' }}
                </button>
                <button @click="exportJSON" class="btn-ui btn-export">JSON Export</button>
                <button @click="exportHTML" class="btn-ui btn-export">Drucken (HTML)</button>
                <button @click="generateAll" class="btn-ui btn-primary">Neue Zahlen 🎲</button>
                <button @click="toggleSolutions()" class="btn-ui btn-toggle">
                    {{ showSolutions ? 'Lösungen ausblenden' : 'Lösungen anzeigen' }}
                </button>
            </div>
        </div>

        <div class="task-grid">
            <div class="column-wrapper">
                <div v-for="(task, index) in tasks.slice(0, halfCount)" :key="'col1-'+index" class="task-row">
                    <div class="task-num">{{ index + 1 }}</div>
                    <div class="content">
                        <div v-if="!showSolutions" class="math-q" v-html="task.textDisplay"></div>
                        <div v-else class="math-a" v-html="task.solution"></div>
                    </div>
                </div>
            </div>

            <div class="column-wrapper">
                <div v-for="(task, index) in tasks.slice(halfCount)" :key="'col2-'+index" class="task-row">
                    <div class="task-num">{{ index + halfCount + 1 }}</div>
                    <div class="content">
                        <div v-if="!showSolutions" class="math-q" v-html="task.textDisplay"></div>
                        <div v-else class="math-a" v-html="task.solution"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    <script src="js/utils.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
